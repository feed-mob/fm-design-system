<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" /> <stop offset="100%" stop-color="#0F766E" />
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="100" height="100%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0F766E" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect x="0" y="0" width="100" height="100" fill="url(#tealGrad)" />

  <line x1="25" y1="0" x2="25" y2="100" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4 4" />
  <line x1="75" y1="0" x2="75" y2="100" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4 4" />
  <line x1="0" y1="25" x2="100" y2="25" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4 4" />
  <line x1="0" y1="75" x2="100" y2="75" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4 4" />

  <circle cx="25" cy="25" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="75" cy="25" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="25" cy="75" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="75" cy="75" r="4" fill="#ffffff" opacity="0.95"/>

  <g transform="translate(50, 50)">
    <rect x="-5" y="-20" width="10" height="40" rx="5" fill="#ffffff" />
    <rect x="-20" y="-5" width="40" height="10" rx="5" fill="#ffffff" />
  </g>
</svg>
